<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쏘울푸드 ERP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd8;
            --secondary: #764ba2;
            --bg: #f5f7fa;
            --white: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        .logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 12px;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 13px;
            color: var(--gray-500);
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            background: var(--gray-100);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            padding: 9px;
            text-align: center;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--gray-500);
            transition: all 0.2s;
            border: none;
            background: none;
        }

        .tab.active {
            background: white;
            color: var(--gray-900);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--gray-300);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: var(--gray-900);
            transition: border-color 0.2s, box-shadow 0.2s;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
        }

        input::placeholder { color: var(--gray-300); }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: -0.2px;
        }

        .btn-primary:hover { opacity: 0.92; }
        .btn-primary:active { transform: scale(0.99); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .message {
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .message.error {
            background: #fef2f2;
            color: var(--error);
            border: 1px solid #fecaca;
            display: block;
        }

        .message.success {
            background: #f0fdf4;
            color: var(--success);
            border: 1px solid #bbf7d0;
            display: block;
        }

        .panel { display: none; }
        .panel.active { display: block; }

        .divider {
            text-align: center;
            color: var(--gray-300);
            font-size: 12px;
            margin: 20px 0;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: var(--gray-100);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 20px;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🍱</div>
            <h1>쏘울푸드 ERP</h1>
            <p>급식 업무 관리 시스템</p>
        </div>

        <div id="message" class="message"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">로그인</button>
            <button class="tab" onclick="switchTab('signup')">회원가입</button>
        </div>

        <!-- 로그인 패널 -->
        <div id="loginPanel" class="panel active">
            <div class="form-group">
                <label>이메일</label>
                <input type="email" id="loginEmail" placeholder="example@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" id="loginPassword" placeholder="비밀번호 입력" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter') handleLogin()">
            </div>
            <button class="btn-primary" id="loginBtn" onclick="handleLogin()">로그인</button>
        </div>

        <!-- 회원가입 패널 -->
        <div id="signupPanel" class="panel">
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="signupName" placeholder="홍길동">
            </div>
            <div class="form-group">
                <label>이메일</label>
                <input type="email" id="signupEmail" placeholder="example@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" id="signupPassword" placeholder="8자 이상" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>비밀번호 확인</label>
                <input type="password" id="signupPasswordConfirm" placeholder="비밀번호 재입력" autocomplete="new-password"
                    onkeydown="if(event.key==='Enter') handleSignup()">
            </div>
            <button class="btn-primary" id="signupBtn" onclick="handleSignup()">가입하기</button>
        </div>

        <div class="footer-note">© 쏘울푸드 · 내부용 시스템</div>
    </div>

    <script>
        // ============================================================
        // ⚠️ 여기에 Supabase 설정을 입력하세요
        // Supabase 대시보드 → Settings → API 에서 복사
        // ============================================================
        const SUPABASE_URL = sb_publishable_4K4ttkogn3Z1yjDXOayqUg_SbcnRwyg;
        const SUPABASE_ANON_KEY = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0a3hxZW15eHZ1aGJpeXBybm9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTc0NTMsImV4cCI6MjA5MDE3MzQ1M30.V5WRRp6118aKDuHEdHHxGvhU7gmLxONKAipKlBzeedM;
        // ============================================================

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 이미 로그인된 경우 앱으로 이동
        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'app.html';
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((el, i) => {
                el.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
            });
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('signupPanel').classList.toggle('active', tab === 'signup');
            clearMessage();
        }

        function showMessage(text, type = 'error') {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `message ${type}`;
        }

        function clearMessage() {
            document.getElementById('message').className = 'message';
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span>처리 중...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'loginBtn' ? '로그인' : '가입하기';
            }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('이메일과 비밀번호를 입력하세요');
                return;
            }

            setLoading('loginBtn', true);
            clearMessage();

            const { error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                setLoading('loginBtn', false);
                const msg = error.message.includes('Invalid') ? '이메일 또는 비밀번호가 올바르지 않습니다' :
                            error.message.includes('Email not confirmed') ? '이메일 인증이 필요합니다. 메일함을 확인하세요' :
                            error.message;
                showMessage(msg);
            } else {
                window.location.href = 'app.html';
            }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupPasswordConfirm').value;

            if (!name || !email || !password || !confirm) {
                showMessage('모든 항목을 입력하세요');
                return;
            }

            if (password.length < 8) {
                showMessage('비밀번호는 8자 이상이어야 합니다');
                return;
            }

            if (password !== confirm) {
                showMessage('비밀번호가 일치하지 않습니다');
                return;
            }

            setLoading('signupBtn', true);
            clearMessage();

            const { error } = await sb.auth.signUp({
                email,
                password,
                options: { data: { name } }
            });

            setLoading('signupBtn', false);

            if (error) {
                const msg = error.message.includes('already registered') ? '이미 사용 중인 이메일입니다' : error.message;
                showMessage(msg);
            } else {
                showMessage('가입 완료! 이메일 인증 후 로그인하세요. (메일함을 확인하세요)', 'success');
                document.getElementById('signupName').value = '';
                document.getElementById('signupEmail').value = '';
                document.getElementById('signupPassword').value = '';
                document.getElementById('signupPasswordConfirm').value = '';
                setTimeout(() => switchTab('login'), 3000);
            }
        }
    </script>
</body>
</html>
